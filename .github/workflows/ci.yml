name: CI — Tradebot-UTIL.v2

on:
  push:
    branches: [infra-1, main]
  pull_request:
    branches: [infra-1, main]

jobs:
  # ── Testes e backtest ────────────────────────────────────────
  test:
    name: Testes + Backtest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_backtest.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_backtest.txt

      - name: Lint com ruff (se disponível)
        run: |
          pip install ruff --quiet
          ruff check src/ backtest/ main.py --ignore E501,E402 || true

      - name: Verifica imports e sintaxe
        run: |
          python -c "from backtest.backtest_engine import UTIL_UNIVERSE, synthetic_util_benchmark; print(f'UTIL_UNIVERSE: {len(UTIL_UNIVERSE)} ativos OK')"
          python -c "from src.strategies.active_momentum_tilt import ActiveMomentumTiltStrategy; print('ActiveMomentumTiltStrategy OK')"
          python -c "from src.risk.risk_manager import RiskManager; print('RiskManager OK')"
          python -c "from src.execution.order_executor import OrderExecutor; print('OrderExecutor OK')"
          python -c "from src.data.price_feed import PriceFeed; print('PriceFeed OK')"
          python -c "import main; print('main.py OK')"

      - name: Backtest multi-período (validação da estratégia)
        run: |
          python -m backtest.util_core_alpha_backtest \
            --multi-period \
            --csv \
            --start 2022-01-01 \
            --end 2026-06-01
        timeout-minutes: 10

      - name: Valida resultado do backtest
        run: |
          python - <<'EOF'
          import pandas as pd, sys
          try:
              df = pd.read_csv("logs/multi_period_summary_v4.csv", index_col=0)
              print(df[["Alpha (%)", "Sharpe", "Win Meses (%)"]].to_string())
              
              # Critérios mínimos de aceitação
              alpha_positive = (df["Alpha (%)"] > 0).sum()
              full_period = df.loc[df.index.str.contains("completo"), "Alpha (%)"]
              
              print(f"\nAlpha positivo: {alpha_positive}/{len(df)} períodos")
              
              if len(full_period) > 0 and float(full_period.iloc[0]) > 0:
                  print(f"✓ Alpha positivo no período completo: {float(full_period.iloc[0]):+.1f}%")
              else:
                  print("⚠ Alpha não positivo no período completo — revisar parâmetros")
              
              if alpha_positive >= 4:
                  print(f"✓ Estratégia superou o UTIL em {alpha_positive}/{len(df)} períodos")
              else:
                  print(f"⚠ Estratégia superou em apenas {alpha_positive}/{len(df)} períodos")
              
              sys.exit(0)
          except FileNotFoundError:
              print("Arquivo de resultados não encontrado — backtest não gerou CSV")
              sys.exit(1)
          EOF

      - name: Upload artefatos de backtest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-py${{ matrix.python-version }}
          path: |
            logs/*.csv
            logs/*.png
          retention-days: 30

  # ── Verificação de segredos ──────────────────────────────────
  security:
    name: Segurança
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verifica credenciais hardcoded
        run: |
          # Garante que nenhuma senha ou token foi commitado
          if grep -r --include="*.py" --include="*.yaml" --include="*.yml" \
            -E "(password|senha|token|secret)\s*[:=]\s*['\"][^'\"]{8,}" \
            --exclude-dir=.git \
            --exclude="config.example.yaml" \
            --exclude="config.active_momentum_tilt.yaml" \
            . 2>/dev/null; then
            echo "⚠ Possíveis credenciais encontradas nos arquivos!"
            exit 1
          else
            echo "✓ Nenhuma credencial hardcoded detectada"
          fi
