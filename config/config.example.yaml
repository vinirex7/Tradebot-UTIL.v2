# ============================================================
# Tradebot-UTIL.v2 — Configuração Principal
# Copie este arquivo para config.yaml e preencha os valores
# ============================================================

mt5:
  login: 123456789          # Número da sua conta XP no MT5
  password: "SUA_SENHA"     # Senha da conta MT5
  server: "XP Investimentos-Real"  # Servidor XP (real) ou "XPI-Demo" (demo)
  timeout: 60000            # Timeout de conexão em ms

trading:
  mode: "paper"             # "live" | "paper" | "backtest"
  capital: 100000.0         # Capital inicial em BRL
  max_position_pct: 0.20    # Exposição máxima por ativo (20%)
  max_drawdown_pct: 0.10    # Drawdown máximo antes de pausar (10%)
  stop_loss_pct: 0.025      # Stop loss por operação (2.5%)
  kelly_fraction: 0.25      # Fração do Kelly Criterion

strategies:
  mean_reversion:
    enabled: true
    weight: 0.35            # Peso na alocação de capital
    timeframe: "H1"         # M1, M5, M15, H1, H4, D1
    bollinger_period: 20
    bollinger_std: 2.0
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    take_profit_pct: 0.015  # Take profit = 1.5% (retorno à média)
    assets:
      - "SBSP3"
      - "EQTL3"
      - "CPLE3"
      - "EGIE3"
      - "TAEE11"

  momentum_macro:
    enabled: true
    weight: 0.30
    timeframe: "D1"
    ema_fast: 9
    ema_mid: 21
    ema_slow: 50
    di1_threshold: 0.1200   # DI1 1 ano; abaixo disso ativa modo momentum long
    assets:
      - "SBSP3"
      - "EQTL3"
      - "ENEV3"
      - "CPLE3"

  pair_trading:
    enabled: true
    weight: 0.15
    timeframe: "D1"
    lookback_days: 60        # Janela para cálculo do z-score
    z_entry: 2.0             # Z-score para abertura
    z_exit: 0.0              # Z-score para fechamento
    pairs:
      - ["EQTL3", "TAEE11"]  # Distribuidora vs Transmissora
      - ["SBSP3", "ENEV3"]   # Saneamento vs Termoelétrica

  dividend_capture:
    enabled: true
    weight: 0.10
    days_before_exdate: 4    # Dias úteis antes do ex-date para entrar
    min_dy_pct: 0.05         # DY mínimo de 5% para operar
    min_volume_brl: 50000000 # Volume médio mínimo diário (R$50M)
    assets:
      - "TAEE11"
      - "EGIE3"
      - "CPFE3"
      - "ENGI11"

  rebalance_anticipation:
    enabled: true
    weight: 0.10
    days_before_rebalance: 5 # Dias úteis antes do rebalanceamento B3
    # Datas de rebalanceamento quadrimestrais (Jan, Mai, Set)
    rebalance_months: [1, 5, 9]

data:
  price_history_days: 252    # Histórico de preços para indicadores (1 ano)
  adjusted_prices: true      # Usar preços ajustados por dividendos
  selic_update_interval: 3600 # Atualizar taxa Selic a cada 1h (segundos)

notifications:
  enabled: false             # Notificações por Telegram (opcional)
  telegram_token: ""
  telegram_chat_id: ""

logging:
  level: "INFO"              # DEBUG | INFO | WARNING | ERROR
  file: "logs/tradebot.log"
  rotation: "1 day"
  retention: "30 days"
